<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MenudelProfe AI - Generador de Menús Semanales</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4CAF50;
            --primary-dark: #388E3C;
            --secondary: #FF9800;
            --accent: #2196F3;
            --bg-light: #F5F7FA;
            --bg-white: #FFFFFF;
            --text-dark: #2C3E50;
            --text-light: #7F8C8D;
            --border-radius: 12px;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 8px 15px rgba(0, 0, 0, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--text-dark);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            color: white;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .main-card {
            background: var(--bg-white);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 30px;
            margin-bottom: 30px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-dark);
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 12px 15px;
            border: 2px solid #E0E0E0;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            border-radius: var(--border-radius);
            margin-bottom: 25px;
            color: white;
        }

        .toggle-label {
            font-weight: 600;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toggle-switch {
            position: relative;
            width: 60px;
            height: 30px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.3);
            transition: 0.4s;
            border-radius: 30px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: 0.4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--secondary);
        }

        input:checked + .slider:before {
            transform: translateX(30px);
        }

        .fit-mode-section {
            display: none;
            background: var(--bg-light);
            padding: 25px;
            border-radius: var(--border-radius);
            margin-bottom: 25px;
        }

        .fit-mode-section.active {
            display: block;
        }

        .fit-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .btn-secondary {
            background: linear-gradient(135deg, var(--secondary) 0%, #F57C00 100%);
            color: white;
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        .btn-outline:hover {
            background: var(--primary);
            color: white;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 25px;
        }

        .results-section {
            display: none;
        }

        .results-section.active {
            display: block;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 24px;
            background: var(--bg-light);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .day-card {
            background: var(--bg-white);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid var(--primary);
        }

        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--bg-light);
        }

        .day-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--primary);
        }

        .day-macros {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .macro-badge {
            background: var(--bg-light);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .meal-item {
            background: var(--bg-light);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .meal-name {
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 5px;
        }

        .meal-macros {
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .recipe-card {
            background: var(--bg-white);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 25px;
            margin-bottom: 20px;
        }

        .recipe-title {
            font-size: 1.4rem;
            color: var(--primary);
            margin-bottom: 15px;
        }

        .recipe-steps {
            list-style: none;
        }

        .recipe-steps li {
            padding: 10px 0;
            padding-left: 35px;
            position: relative;
        }

        .recipe-steps li:before {
            content: counter(step-counter);
            counter-increment: step-counter;
            position: absolute;
            left: 0;
            top: 10px;
            background: var(--primary);
            color: white;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .recipe-steps {
            counter-reset: step-counter;
        }

        .shopping-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .category-card {
            background: var(--bg-white);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 20px;
        }

        .category-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .shopping-item {
            display: flex;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--bg-light);
        }

        .shopping-item:last-child {
            border-bottom: none;
        }

        .shopping-item input[type="checkbox"] {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .cost-estimate {
            background: linear-gradient(135deg, var(--secondary) 0%, #F57C00 100%);
            color: white;
            padding: 20px;
            border-radius: var(--border-radius);
            text-align: center;
            margin-top: 20px;
        }

        .cost-amount {
            font-size: 2.5rem;
            font-weight: 700;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid var(--bg-light);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2rem;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .btn-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }

            .tabs {
                flex-direction: column;
            }

            .tab-btn {
                width: 100%;
            }
        }

        .info-tooltip {
            position: relative;
            display: inline-block;
            cursor: help;
            margin-left: 5px;
        }

        .info-tooltip i {
            color: var(--accent);
            font-size: 0.9rem;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-utensils"></i> MenudelProfe AI</h1>
            <p>Genera menús semanales personalizados y listas de la compra automáticas</p>
        </header>

        <!-- Formulario Principal -->
        <div class="main-card">
            <form id="menuForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="people">
                            <i class="fas fa-users"></i> Número de personas
                            <span class="info-tooltip"><i class="fas fa-info-circle"></i></span>
                        </label>
                        <input type="number" id="people" min="1" max="20" value="2" required>
                    </div>

                    <div class="form-group">
                        <label for="days">
                            <i class="fas fa-calendar"></i> Días de planificación
                        </label>
                        <select id="days">
                            <option value="3">3 días</option>
                            <option value="5">5 días</option>
                            <option value="7" selected>7 días</option>
                            <option value="14">14 días</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="budget">
                            <i class="fas fa-euro-sign"></i> Presupuesto aproximado (€)
                        </label>
                        <input type="number" id="budget" min="10" max="500" value="50" placeholder="Ej: 50">
                    </div>

                    <div class="form-group">
                        <label for="cookTime">
                            <i class="fas fa-clock"></i> Tiempo máximo por receta (min)
                        </label>
                        <input type="number" id="cookTime" min="10" max="180" value="45" placeholder="Ej: 45">
                    </div>

                    <div class="form-group">
                        <label for="preferences">
                            <i class="fas fa-heart"></i> Preferencias alimentarias
                        </label>
                        <select id="preferences">
                            <option value="none">Sin preferencias</option>
                            <option value="vegetarian">Vegetariano</option>
                            <option value="vegan">Vegano</option>
                            <option value="pescetarian">Pescetariano</option>
                            <option value="keto">Keto / Bajo en carbohidratos</option>
                            <option value="mediterranean">Dieta Mediterránea</option>
                            <option value="glutenfree">Sin Gluten</option>
                            <option value="dairyfree">Sin Lácteos</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="supermarket">
                            <i class="fas fa-store"></i> Supermercado habitual
                        </label>
                        <select id="supermarket">
                            <option value="any">Cualquiera</option>
                            <option value="mercadona">Mercadona</option>
                            <option value="carrefour">Carrefour</option>
                            <option value="lidl">Lidl</option>
                            <option value="aldi">Aldi</option>
                            <option value="eroski">Eroski</option>
                            <option value=" Consum">Consum</option>
                        </select>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 25px;">
                    <label for="excluded">
                        <i class="fas fa-ban"></i> Alimentos que no quieres usar
                    </label>
                    <textarea id="excluded" placeholder="Ej: mariscos, cilantro, berenjenas... (separados por comas)"></textarea>
                </div>

                <!-- Modo Fit Toggle -->
                <div class="toggle-container">
                    <div class="toggle-label">
                        <i class="fas fa-dumbbell"></i>
                        Modo Fit
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" id="fitModeToggle">
                        <span class="slider"></span>
                    </label>
                </div>

                <!-- Sección Modo Fit -->
                <div class="fit-mode-section" id="fitModeSection">
                    <h3 style="margin-bottom: 20px; color: var(--primary);">
                        <i class="fas fa-chart-line"></i> Configuración Nutricional
                    </h3>
                    <div class="fit-grid">
                        <div class="form-group">
                            <label for="calories">Calorías diarias objetivo</label>
                            <input type="number" id="calories" min="1000" max="4000" value="2000" placeholder="Ej: 2000">
                        </div>

                        <div class="form-group">
                            <label for="protein">Proteínas (g/día)</label>
                            <input type="number" id="protein" min="50" max="300" value="150" placeholder="Ej: 150">
                        </div>

                        <div class="form-group">
                            <label for="carbs">Carbohidratos (g/día)</label>
                            <input type="number" id="carbs" min="50" max="500" value="200" placeholder="Ej: 200">
                        </div>

                        <div class="form-group">
                            <label for="fats">Grasas (g/día)</label>
                            <input type="number" id="fats" min="30" max="200" value="65" placeholder="Ej: 65">
                        </div>

                        <div class="form-group">
                            <label for="mealsPerDay">Comidas al día</label>
                            <select id="mealsPerDay">
                                <option value="3">3 comidas</option>
                                <option value="4">4 comidas</option>
                                <option value="5" selected>5 comidas</option>
                                <option value="6">6 comidas</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="goal">Objetivo</label>
                            <select id="goal">
                                <option value="lose">Perder grasa</option>
                                <option value="maintain" selected>Mantener peso</option>
                                <option value="gain">Ganar músculo</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="btn-group">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-magic"></i> Generar Menú
                    </button>
                </div>
            </form>
        </div>

        <!-- Loading -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <h3>Generando tu menú personalizado...</h3>
            <p>La IA está creando recetas perfectas para ti</p>
        </div>

        <!-- Resultados -->
        <div class="results-section" id="results">
            <div class="tabs">
                <button class="tab-btn active" data-tab="menu">
                    <i class="fas fa-calendar-alt"></i> Menú Semanal
                </button>
                <button class="tab-btn" data-tab="recipes">
                    <i class="fas fa-book-open"></i> Recetas
                </button>
                <button class="tab-btn" data-tab="shopping">
                    <i class="fas fa-shopping-cart"></i> Lista de Compra
                </button>
            </div>

            <!-- Tab Menú -->
            <div class="tab-content active" id="menuTab">
                <div id="weeklyMenu"></div>
                <div class="btn-group">
                    <button class="btn btn-secondary" onclick="regenerateMenu()">
                        <i class="fas fa-redo"></i> Regenerar Menú
                    </button>
                    <button class="btn btn-outline" onclick="exportToPDF()">
                        <i class="fas fa-file-pdf"></i> Exportar PDF
                    </button>
                    <button class="btn btn-outline" onclick="copyMenu()">
                        <i class="fas fa-copy"></i> Copiar Menú
                    </button>
                </div>
            </div>

            <!-- Tab Recetas -->
            <div class="tab-content" id="recipesTab">
                <div id="recipesList"></div>
                <div class="btn-group">
                    <button class="btn btn-outline" onclick="exportRecipesPDF()">
                        <i class="fas fa-file-pdf"></i> Exportar Recetas PDF
                    </button>
                    <button class="btn btn-outline" onclick="copyRecipes()">
                        <i class="fas fa-copy"></i> Copiar Recetas
                    </button>
                </div>
            </div>

            <!-- Tab Lista de Compra -->
            <div class="tab-content" id="shoppingTab">
                <div id="shoppingList"></div>
                <div class="cost-estimate" id="costEstimate">
                    <p>Estimación de coste total</p>
                    <div class="cost-amount" id="totalCost">€0.00</div>
                </div>
                <div class="btn-group">
                    <button class="btn btn-secondary" onclick="regenerateMenu()">
                        <i class="fas fa-redo"></i> Regenerar Menú
                    </button>
                    <button class="btn btn-outline" onclick="exportShoppingPDF()">
                        <i class="fas fa-file-pdf"></i> Exportar PDF
                    </button>
                    <button class="btn btn-outline" onclick="copyShoppingList()">
                        <i class="fas fa-copy"></i> Copiar Lista
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>

        // Función principal para generar menú
        function generateMenu() {
            // Mostrar loading
            document.getElementById('loading').classList.add('active');
            document.getElementById('results').classList.remove('active');

            // Obtener valores del formulario
            const formData = {
                people: parseInt(document.getElementById('people').value),
                days: parseInt(document.getElementById('days').value),
                budget: parseFloat(document.getElementById('budget').value) || 50,
                cookTime: parseInt(document.getElementById('cookTime').value),
                preferences: document.getElementById('preferences').value,
                excluded: document.getElementById('excluded').value.toLowerCase().split(',').map(s => s.trim()).filter(s => s),
                supermarket: document.getElementById('supermarket').value,
                fitMode: isFitMode,
                calories: isFitMode ? parseInt(document.getElementById('calories').value) : null,
                protein: isFitMode ? parseInt(document.getElementById('protein').value) : null,
                carbs: isFitMode ? parseInt(document.getElementById('carbs').value) : null,
                fats: isFitMode ? parseInt(document.getElementById('fats').value) : null,
                mealsPerDay: isFitMode ? parseInt(document.getElementById('mealsPerDay').value) : 5,
                goal: isFitMode ? document.getElementById('goal').value : null
            };

            // Simular tiempo de generación
            setTimeout(() => {
                currentMenu = createMenu(formData);
                renderResults(currentMenu, formData);
                document.getElementById('loading').classList.remove('active');
                document.getElementById('results').classList.add('active');
            }, 2000);
        }

        // Crear menú basado en preferencias
        function createMenu(formData) {
            const menu = [];
            const days = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado', 'Domingo'];
            const usedRecipes = new Set();

            for (let d = 0; d < formData.days; d++) {
                const dayMenu = {
                    day: days[d],
                    meals: [],
                    totalCalories: 0,
                    totalProtein: 0,
                    totalCarbs: 0,
                    totalFats: 0
                };

                const mealTypes = formData.fitMode && formData.mealsPerDay >= 5 
                    ? ['breakfast', 'snack', 'lunch', 'snack', 'dinner']
                    : ['breakfast', 'lunch', 'dinner'];

                mealTypes.forEach(mealType => {
                    const availableRecipes = recipesDB[mealType].filter(recipe => {
                        // Filtrar por tiempo
                        if (recipe.time > formData.cookTime) return false;
                        
                        // Filtrar por preferencias
                        if (formData.preferences !== 'none' && !recipe.tags.includes(formData.preferences)) {
                            // Excepción para mediterranean
                            if (formData.preferences === 'mediterranean') return true;
                            return false;
                        }

                        // Filtrar alimentos excluidos
                        const ingredientStr = recipe.ingredients.join(' ').toLowerCase();
                        for (const excluded of formData.excluded) {
                            if (ingredientStr.includes(excluded)) return false;
                        }

                        return true;
                    });

                    // Seleccionar receta (evitar repetición)
                    let selectedRecipe;
                    const filteredAvailable = availableRecipes.filter(r => !usedRecipes.has(r.name));
                    
                    if (filteredAvailable.length > 0) {
                        selectedRecipe = filteredAvailable[Math.floor(Math.random() * filteredAvailable.length)];
                    } else if (availableRecipes.length > 0) {
                        selectedRecipe = availableRecipes[Math.floor(Math.random() * availableRecipes.length)];
                        usedRecipes.clear(); // Resetear si no hay opciones
                    } else {
                        selectedRecipe = recipesDB[mealType][0]; // Fallback
                    }

                    usedRecipes.add(selectedRecipe.name);

                    // Ajustar cantidades según número de personas
                    const multiplier = formData.people;
                    const adjustedRecipe = {
                        ...selectedRecipe,
                        ingredients: selectedRecipe.ingredients.map(ing => adjustIngredient(ing, multiplier)),
                        calories: Math.round(selectedRecipe.calories * multiplier),
                        protein: Math.round(selectedRecipe.protein * multiplier),
                        carbs: Math.round(selectedRecipe.carbs * multiplier),
                        fats: Math.round(selectedRecipe.fats * multiplier)
                    };

                    dayMenu.meals.push(adjustedRecipe);
                    dayMenu.totalCalories += adjustedRecipe.calories;
                    dayMenu.totalProtein += adjustedRecipe.protein;
                    dayMenu.totalCarbs += adjustedRecipe.carbs;
                    dayMenu.totalFats += adjustedRecipe.fats;
                });

                menu.push(dayMenu);
            }

            return menu;
        }

        // Ajustar ingredientes según personas
        function adjustIngredient(ingredient, multiplier) {
            const match = ingredient.match(/^(\d+)g\s+(.*)$/);
            if (match) {
                const amount = Math.round(parseInt(match[1]) * multiplier);
                return `${amount}g ${match[2]}`;
            }
            return ingredient;
        }

        // Renderizar lista de compra
        function renderShoppingList(menu, formData) {
            const container = document.getElementById('shoppingList');
            const shoppingList = {};

            // Categorías
            const categories = {
                'proteinas': ['pollo', 'pavo', 'ternera', 'cerdo', 'pescado', 'salmón', 'merluza', 'atún', 'gambas', 'huevos', 'jamón'],
                'lácteos': ['leche', 'yogur', 'queso', 'requesón'],
                'cereales': ['arroz', 'pasta', 'pan', 'avena', 'quinoa', 'tortillas'],
                'verduras': ['brócoli', 'espinacas', 'lechuga', 'tomate', 'cebolla', 'ajo', 'zanahoria', 'calabaza', 'berenjena', 'calabacín', 'pimiento', 'espárragos', 'champiñones', 'kale'],
                'frutas': ['plátano', 'manzana', 'limón', 'frutos rojos', 'arándanos'],
                'legumbres': ['lentejas', 'garbanzos', 'judías'],
                'frutos secos': ['almendras', 'nueces', 'piñones', 'avellanas'],
                'despensa': ['aceite', 'miel', 'pesto', 'hummus', 'tahini', 'salsa', 'especias', 'semillas', 'chía']
            };

            // Recopilar todos los ingredientes
            menu.forEach(day => {
                day.meals.forEach(meal => {
                    meal.ingredients.forEach(ingredient => {
                        // Extraer nombre del ingrediente
                        const cleanIngredient = extractIngredientName(ingredient);
                        const category = findCategory(cleanIngredient, categories);
                        
                        if (!shoppingList[category]) {
                            shoppingList[category] = [];
                        }
                        
                        // Añadir si no existe
                        if (!shoppingList[category].includes(ingredient)) {
                            shoppingList[category].push(ingredient);
                        }
                    });
                });
            });

            // Renderizar por categorías
            const categoryIcons = {
                'proteinas': '🥩',
                'lácteos': '🥛',
                'cereales': '🍞',
                'verduras': '🥬',
                'frutas': '🍎',
                'legumbres': '🫘',
                'frutos secos': '🥜',
                'despensa': '🧂'
            };

            let html = '<div class="shopping-list">';
            
            Object.entries(shoppingList).forEach(([category, items]) => {
                if (items.length > 0) {
                    html += `
                        <div class="category-card">
                            <div class="category-title">
                                ${categoryIcons[category] || '📦'} ${capitalize(category)}
                            </div>
                            ${items.map(item => `
                                <div class="shopping-item">
                                    <input type="checkbox" id="item_${item.replace(/\s/g, '_')}">
                                    <label for="item_${item.replace(/\s/g, '_')}">${item}</label>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }
            });

            html += '</div>';
            container.innerHTML = html;

            // Calcular coste estimado
            calculateCost(menu, formData);
        }

        // Extraer nombre del ingrediente
        function extractIngredientName(ingredient) {
            return ingredient.replace(/^\d+g\s*/, '').toLowerCase();
        }

        // Encontrar categoría
        function findCategory(ingredient, categories) {
            for (const [category, keywords] of Object.entries(categories)) {
                for (const keyword of keywords) {
                    if (ingredient.includes(keyword)) {
                        return category;
                    }
                }
            }
            return 'despensa';
        }

        // Capitalizar
        function capitalize(str) {
            return str.charAt(0).toUpperCase() + str.slice(1);
        }

        // Calcular coste estimado
        function calculateCost(menu, formData) {
            // Precios aproximados por 100g o unidad
            const prices = {
                'pollo': 0.8, 'pavo': 0.9, 'ternera': 1.2, 'cerdo': 0.7,
                'pescado': 1.5, 'salmón': 2.5, 'merluza': 1.2, 'atún': 0.8, 'gambas': 1.8,
                'huevos': 0.25, 'jamón': 1.5,
                'leche': 0.08, 'yogur': 0.15, 'queso': 1.2,
                'arroz': 0.15, 'pasta': 0.12, 'pan': 0.2, 'avena': 0.3, 'quinoa': 0.5,
                'brócoli': 0.4, 'espinacas': 0.5, 'lechuga': 0.3, 'tomate': 0.3,
                'cebolla': 0.2, 'ajo': 0.1, 'zanahoria': 0.25, 'calabaza': 0.3,
                'plátano': 0.3, 'manzana': 0.35, 'limón': 0.2, 'frutos rojos': 0.8,
                'lentejas': 0.2, 'garbanzos': 0.25,
                'almendras': 1.5, 'nueces': 1.8,
                'aceite': 0.3, 'miel': 0.5, 'pesto': 0.8, 'hummus': 0.6
            };

            let totalCost = 0;
            const allIngredients = new Set();

            menu.forEach(day => {
                day.meals.forEach(meal => {
                    meal.ingredients.forEach(ingredient => {
                        allIngredients.add(ingredient);
                    });
                });
            });

            allIngredients.forEach(ingredient => {
                const match = ingredient.match(/^(\d+)g\s+(.*)$/);
                if (match) {
                    const grams = parseInt(match[1]);
                    const name = match[2].toLowerCase();
                    
                    for (const [key, price] of Object.entries(prices)) {
                        if (name.includes(key)) {
                            totalCost += (grams / 100) * price * formData.people;
                            break;
                        }
                    }
                }
            });

            // Ajustar por supermercado
            const supermarketMultiplier = {
                'mercadona': 0.9,
                'carrefour': 1.0,
                'lidl': 0.85,
                'aldi': 0.85,
                'eroski': 0.95,
                'consum': 0.95,
                'any': 0.95
            };

            totalCost *= supermarketMultiplier[formData.supermarket] || 0.95;

            // Mostrar coste
            document.getElementById('totalCost').textContent = `€${totalCost.toFixed(2)}`;
        }

            text += `\n💰 Estimación: ${totalCost}`;

            navigator.clipboard.writeText(text).then(() => {
                alert('✅ Lista copiada al portapapeles');
            });
        }
    </script>
</body>
</html>
